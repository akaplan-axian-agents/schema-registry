name: Terraform Teardown

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment.
        type: choice
        required: true
        options:
          - test
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  teardown:
    name: Destroy Azure Container Apps deployment
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_image_tag: teardown
      TF_VAR_FILE: environments/${{ inputs.environment }}.tfvars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment configuration
        id: environment-config
        run: |
          config_path=".github/terraform-environments/${{ inputs.environment }}.yml"
          node - "$config_path" <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const path = process.argv[2];
          const config = fs.readFileSync(path, "utf8");
          for (const line of config.split(/\r?\n/)) {
            const match = line.match(/^([a-z_]+):\s*(.+?)\s*$/);
            if (match) {
              console.log(`${match[1]}=${match[2].replace(/^["']|["']$/g, "")}`);
            }
          }
          NODE

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Restore Terraform init directory
        uses: actions/cache@v4
        with:
          path: infra/terraform/.terraform
          key: terraform-${{ runner.os }}-${{ inputs.environment }}-${{ hashFiles('infra/terraform/.terraform.lock.hcl', '.github/terraform-environments/*.yml') }}
          restore-keys: |
            terraform-${{ runner.os }}-${{ inputs.environment }}-

      - name: Terraform init
        run: |
          terraform -chdir=infra/terraform init \
            -backend-config="resource_group_name=${{ steps.environment-config.outputs.state_resource_group_name }}" \
            -backend-config="storage_account_name=${{ steps.environment-config.outputs.state_storage_account_name }}" \
            -backend-config="container_name=${{ steps.environment-config.outputs.state_container_name }}" \
            -backend-config="key=${{ steps.environment-config.outputs.state_key }}"

      - name: Destroy deployment
        run: terraform -chdir=infra/terraform destroy -auto-approve -var-file="$TF_VAR_FILE"
