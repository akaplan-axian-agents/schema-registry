name: Version Bump

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump package version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Increment patch version
        id: version
        run: |
          new_version="$(npm version patch --no-git-tag-version --ignore-scripts)"
          echo "number=${new_version#v}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${{ steps.version.outputs.number }} [skip ci]"
          git tag "v${{ steps.version.outputs.number }}" "${{ github.event.pull_request.merge_commit_sha }}"
          git pull --rebase origin main
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.number }}"
