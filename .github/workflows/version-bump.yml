name: Version Bump

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump package version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Verify version bump token is available
        env:
          VERSION_BUMP_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          if [ -z "$VERSION_BUMP_TOKEN" ]; then
            echo "VERSION_BUMP_TOKEN is required so the version workflow can bypass repository rules for its direct main update."
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read merge commit version
        id: version
        run: |
          release_version="$(
            git show "${{ github.event.pull_request.merge_commit_sha }}:package.json" |
            node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input).version));"
          )"
          echo "release=$release_version" >> "$GITHUB_OUTPUT"

      - name: Prepare next main version
        id: next-version
        run: |
          next_version="$(npm version patch --no-git-tag-version --ignore-scripts)"
          echo "number=${next_version#v}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: prepare version v${{ steps.next-version.outputs.number }} [skip ci]"
          git tag "v${{ steps.version.outputs.release }}" "${{ github.event.pull_request.merge_commit_sha }}"
          git pull --rebase origin main
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.release }}"
